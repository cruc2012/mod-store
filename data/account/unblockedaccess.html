<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      color: rgb(0, 0, 0);
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }
    #errorBox {
      text-align: center;
      display: none;
    }
    #gameFrame {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
    #fallbackMessage {
      color: red;
      display: none;
      font-size: 18px;
    }
    #accessDenied {
      color: red;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="errorBox">
    <p id="accessDenied">Access Denied: Invalid Session</p>
  </div>

  <object id="gameFrame" data="" onerror="showFallback()"></object>
  <div id="fallbackMessage">
    <p>Sorry, this website cannot be embedded in the page. Please try visiting it directly.</p>
  </div>

  <script>
    // Check if session storage has a valid session
    const validSession = "validSession"; // This will be your key in sessionStorage

    const sessionData = sessionStorage.getItem(validSession);

    if (!sessionData) {
      // If there is no session data, show access denied
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('gameFrame').style.display = 'none';
    } else {
      // Session is valid, load the requested URL
      const urlParams = new URLSearchParams(window.location.search);
      const url = urlParams.get("url");

      if (!url.startsWith("http") && !url.startsWith("https")) {
        alert("Please enter a valid URL (with http:// or https://)");
        return;
      }
      
      document.getElementById('gameFrame').setAttribute('data', url);
      document.getElementById('gameFrame').style.display = 'block';
    }

    function showFallback() {
      document.getElementById('gameFrame').style.display = 'none';
      document.getElementById('fallbackMessage').style.display = 'block';
    }
  </script>
</body>
</html>
