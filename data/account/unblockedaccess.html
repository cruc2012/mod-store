<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      color: rgb(0, 0, 0);
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }
    #errorBox {
      color: red;
      font-size: 18px;
      display: none;
    }
    #consentBox {
      text-align: center;
    }
    #gameFrame {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
    input {
      width: 300px;
    }
    #watermark {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 14px;
      color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }
  </style>
</head>

  <div id="errorBox">Access Denied: Invalid Session</div>

  <div id="consentBox">
    <h1>Website Unblocker</h1>
    <p>Enter the URL of the website you want to unblock.</p>
    <input type="text" id="gameURL" placeholder="https://example.com">
    <button onclick="loadGame()">Continue</button>
  </div>

  <object id="gameFrame" data="" onerror="showFallback()"></object>
  <div id="fallbackMessage" style="display: none;">
    <p>Sorry, this website cannot be embedded in the page. Please try visiting it directly.</p>
  </div>

  <!-- Watermark text -->
  <div id="watermark">
    You're using <strong>mod-store.customvibes.store</strong>
  </div>
