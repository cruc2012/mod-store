<!DOCTYPE html>
<html>
<head>
  <title>Website Unblocker</title>
  <script>
    function getTokenFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token");
    }

    function verifyAccess() {
      const tokenFromURL = getTokenFromURL();
      const storedToken = localStorage.getItem("access_token");

      if (tokenFromURL !== storedToken || !tokenFromURL) {
        document.body.innerHTML = "<h2>Access denied</h2>";
        return false;
      }

      return true;
    }

    window.onload = () => {
      if (verifyAccess()) {
        document.body.innerHTML = `
          <h1>Website Unblocker</h1>
          <p>Enter a URL to unblock:</p>
          <input id="urlInput" placeholder="https://example.com">
          <button onclick="loadSite()">Go</button>
          <div id="viewer" style="margin-top:20px;"></div>
        `;
      }
    }

    function loadSite() {
      const url = document.getElementById("urlInput").value;
      if (!url.startsWith("http")) {
        alert("Invalid URL");
        return;
      }

      document.getElementById("viewer").innerHTML = `
        <object data="${url}" width="100%" height="600px"></object>
      `;
    }
  </script>
</head>
<body>
</body>
</html>
