<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      color: rgb(0, 0, 0);
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #errorBox {
      color: red;
      font-size: 18px;
      display: none;
    }
    #consentBox {
      text-align: center;
    }
    #gameFrame {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
    input {
      width: 300px;
    }
  </style>
</head>
<body>
  <div id="errorBox">Access Denied: Invalid Session</div>

  <div id="consentBox">
    <h1>Website Unblocker</h1>
    <p>Enter the URL you want to access:</p>
    <input type="text" id="gameURL" placeholder="https://example.com">
    <button onclick="loadGame()">Continue</button>
  </div>

  <object id="gameFrame" data=""></object>

  <script>
    const session = localStorage.getItem('session_file');

    if (session !== 'session_file') {
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('consentBox').style.display = 'none';
    } else {
      localStorage.removeItem('session_file'); // one-time access
    }

    function loadGame() {
      const url = document.getElementById('gameURL').value;
      if (!url.startsWith("http")) {
        document.getElementById('errorBox').innerText = "Access Denied: Invalid URL";
        document.getElementById('errorBox').style.display = 'block';
        document.getElementById('consentBox').style.display = 'none';
        return;
      }

      document.getElementById('consentBox').style.display = 'none';
      const frame = document.getElementById('gameFrame');
      frame.setAttribute('data', url);
      frame.style.display = 'block';
    }
  </script>
</body>
</html>
