<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      color: rgb(0, 0, 0);
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }
    #errorBox {
      text-align: center;
      display: none;
    }
    #gameFrame {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
    #fallbackMessage {
      color: red;
      display: none;
      font-size: 18px;
    }
    #accessDenied {
      color: red;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="errorBox">
    <p id="accessDenied">Access Denied: Invalid Session</p>
  </div>

  <object id="gameFrame" data="" onerror="showFallback()"></object>
  <div id="fallbackMessage">
    <p>Sorry, this website cannot be embedded in the page. Please try visiting it directly.</p>
  </div>

  <script>
    // Check for session
    const validSession = "validSession"; // The session key you use for validation
    const sessionData = sessionStorage.getItem(validSession);

    // Check if there's no session or it's invalid
    if (!sessionData) {
      // If no valid session, show access denied
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('gameFrame').style.display = 'none';
    } else {
      // Session is valid, get the URL parameter and try to load it
      const urlParams = new URLSearchParams(window.location.search);
      const url = urlParams.get("url");

      // Validate the URL
      if (url && (url.startsWith("http://") || url.startsWith("https://"))) {
        document.getElementById('gameFrame').setAttribute('data', url);
        document.getElementById('gameFrame').style.display = 'block';
      } else {
        alert("Invalid URL");
        showFallback();
      }
    }

    function showFallback() {
      document.getElementById('gameFrame').style.display = 'none';
      document.getElementById('fallbackMessage').style.display = 'block';
    }
  </script>
</body>
</html>
