<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>
  <style>
    /* Simple styling for the unblocker */
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #ffffff;
      color: #333;
      text-align: center;
    }
    #errorBox {
      color: red;
      font-size: 18px;
      display: none;
    }
    #gameFrame {
      width: 100vw;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div id="errorBox">
    Access Denied: Invalid Session
  </div>

  <object id="gameFrame" data="" style="display:none;"></object>

  <script>
    // Simulate the checking of a session file using localStorage
    const sessionData = localStorage.getItem('session_file');
    
    // If session data doesn't exist or isn't valid, show access denied
    if (!sessionData || sessionData !== 'session_file') {
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('gameFrame').style.display = 'none';
    } else {
      // Simulate successful unblocker functionality (replace with actual URL)
      const url = 'https://example.com';  // Replace with the actual URL to unblock
      document.getElementById('gameFrame').setAttribute('data', url);
      document.getElementById('gameFrame').style.display = 'block';
    }
  </script>
</body>
</html>
