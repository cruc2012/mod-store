<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      color: rgb(0, 0, 0);
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      position: relative;
    }
    #errorBox {
      color: red;
      font-size: 18px;
      display: none;
    }
    #consentBox {
      text-align: center;
    }
    #gameFrame {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
    input {
      width: 300px;
    }
    #watermark {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 14px;
      color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="errorBox">Access Denied: Invalid Session</div>

  <div id="consentBox">
    <h1>Website Unblocker</h1>
    <p>Enter the URL of the website you want to unblock.</p>
    <input type="text" id="gameURL" placeholder="https://example.com">
    <button onclick="loadGame()">Continue</button>
  </div>

  <object id="gameFrame" data="" onerror="showFallback()"></object>
  <div id="fallbackMessage" style="display: none;">
    <p>Sorry, this website cannot be embedded in the page. Please try visiting it directly.</p>
  </div>

  <!-- Watermark text -->
  <div id="watermark">
    You're using <strong>mod-store.customvibes.store</strong>
  </div>

  <script>
    // Check if the session is stored in localStorage
    const sessionData = localStorage.getItem('session_file');
    
    // If session is not valid or doesn't exist, show access denied
    if (!sessionData || sessionData !== 'session_file') {
      document.getElementById('errorBox').style.display = 'block';
      document.getElementById('consentBox').style.display = 'none';
    } else {
      // If session is valid, show the URL input form
      document.getElementById('consentBox').style.display = 'block';
      
      // Remove session file after validation
      localStorage.removeItem('session_file');
    }

    // Function to load the game URL
    function loadGame() {
      const url = document.getElementById('gameURL').value;

      // Validate the URL
      if (!url.startsWith("http") && !url.startsWith("https")) {
        document.getElementById('errorBox').innerText = "Please enter a valid URL (with http:// or https://)";
        document.getElementById('errorBox').style.display = 'block';
        return;
      }

      // Hide the consent box and show the iframe
      document.getElementById('consentBox').style.display = 'none';
      const gameFrame = document.getElementById('gameFrame');
      gameFrame.setAttribute('data', url);
      gameFrame.style.display = 'block';

      // Check if the URL can be loaded
      setTimeout(() => {
        const gameFrameContent = gameFrame.contentDocument || gameFrame.contentWindow.document;

        if (!gameFrameContent || gameFrameContent.URL === 'about:blank') {
          showFallback();
        }
      }, 2000); // Give the object a moment to try loading
    }

    // Show fallback message if the URL can't be embedded
    function showFallback() {
      document.getElementById('gameFrame').style.display = 'none';
      document.getElementById('fallbackMessage').style.display = 'block';
    }
  </script>
</body>
</html>
