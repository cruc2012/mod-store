<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      color: rgb(0, 0, 0);
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #consentBox {
      text-align: center;
    }
    #gameFrame {
      display: none;
      width: 100vw;
      height: 100vh;
      border: none;
    }
    #fallbackMessage {
      color: red;
      display: none;
      font-size: 18px;
    }
    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }
    input {
      width: 300px;
    }
    #watermark {
      position: fixed;
      bottom: 10px;
      right: 10px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <div id="consentBox">
    <h1>Website Unblocker</h1>
    <p>Enter the URL of the website you want to unblock.</p>
    <input type="text" id="gameURL" placeholder="https://example.com">
    <button onclick="loadGame()">Continue</button>
  </div>

  <object id="gameFrame" data="" onerror="showFallback()"></object>
  <div id="fallbackMessage">
    <p>Sorry, this website cannot be embedded in the page. Please try visiting it directly.</p>
  </div>

  <div id="watermark">You're using mod-store.customvibes.store</div>

  <script>
    // Check if the user is coming from one of the allowed websites
    const allowedReferrers = [
      "https://mod-store.customvibes.store/data/account/publisher/", // The original website's URL
      "https://mod-store.customvibes.store/data/account/developer/" // Add a second allowed website
    ];

    if (!allowedReferrers.includes(document.referrer)) {
      // If the referrer is not in the allowed list, show an alert and block access
      alert("This page can only be accessed from an authorized website.");
      window.location.href = allowedReferrers[0]; // Redirect to the first allowed site
    }

    function loadGame() {
      const url = document.getElementById('gameURL').value;

      // Check if the URL is valid
      if (!url.startsWith("http") && !url.startsWith("https")) {
        alert("Please enter a valid URL (with http:// or https://)");
        return;
      }

      // Hide the consent box
      document.getElementById('consentBox').style.display = 'none';

      // Set the URL in the object tag
      const gameFrame = document.getElementById('gameFrame');
      gameFrame.setAttribute('data', url);
      gameFrame.style.display = 'block';

      // Check if the URL can be loaded
      setTimeout(() => {
        const gameFrameContent = gameFrame.contentDocument || gameFrame.contentWindow.document;
        if (!gameFrameContent || gameFrameContent.URL === 'about:blank') {
          showFallback();
        }
      }, 2000); // Give the object a moment to try loading
    }

    function showFallback() {
      document.getElementById('gameFrame').style.display = 'none';
      document.getElementById('fallbackMessage').style.display = 'block';
    }
  </script>
</body>
</html>
