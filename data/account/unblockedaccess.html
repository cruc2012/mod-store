<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website Unblocker</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    #gameFrame {
      display: none;
      width: 100vw;
      height: 90vh;
      border: none;
    }
  </style>
</head>
<body>
  <div id="mainContent" style="display:none;">
    <h1>Website Unblocker</h1>
    <input type="text" id="gameURL" placeholder="https://example.com">
    <button onclick="loadGame()">Launch</button>
    <object id="gameFrame"></object>
  </div>

  <div id="errorMessage" style="color:red;"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");
    const validToken = sessionStorage.getItem("unblocker-token");

    if (token && token === validToken) {
      document.getElementById("mainContent").style.display = "block";
    } else {
      document.getElementById("errorMessage").innerText = "Access denied: Invalid or missing token.";
    }

    function loadGame() {
      const url = document.getElementById('gameURL').value;
      if (!url.startsWith("http")) {
        alert("Enter a valid URL starting with http or https");
        return;
      }
      const frame = document.getElementById("gameFrame");
      frame.setAttribute("data", url);
      frame.style.display = "block";
    }
  </script>
</body>
</html>
