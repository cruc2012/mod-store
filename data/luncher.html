<!DOCTYPE html>
<html>
<head>
  <title>Launcher</title>
  <script>
    function launchUnblocker() {
      // Set session file
      localStorage.setItem("session_file", "session_file");

      // Open unblocker in a new tab
      window.open("/data/account/unblockedaccess.html", "_blank");
    }
  </script>
</head>
<body>
  <button onclick="launchUnblocker()">Launch Unblocker</button>
</body>
</html>
