<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unblocker Launcher</title>
</head>
<body>
  <div id="launcherBox">
    <h1>Launch Website Unblocker</h1>
    <p>Click below to use the website unblocker tool.</p>
    <button id="launchButton" onclick="launchUnblocker()">Launch Unblocker</button>
  </div>

  <script>
    function launchUnblocker() {
      // Set session data in sessionStorage to simulate session authentication
      const validSession = "validSession"; // This will be your key in sessionStorage
      sessionStorage.setItem(validSession, "true");

      // Define the URL you want to unblock
      const url = "https://example.com"; // Replace with the actual URL to unblock

      // Redirect to unblocker page with the URL as a query parameter
      window.location.href = `unblockedaccess.html?url=${encodeURIComponent(url)}`;
    }
  </script>
</body>
</html>
