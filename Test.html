<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Redirect</title>
</head>
<body>
    <h2>Enter a value to append after /login/:</h2>
    <input type="text" id="inputBox" placeholder="Type something...">
    <button onclick="updateURL()">Go</button>

    <script>
        function updateURL() {
            let inputValue = document.getElementById("inputBox").value.trim();
            if (inputValue) {
                window.location.href = window.location.href + "/login/" + encodeURIComponent(inputValue);
            }
        }
    </script>
</body>
</html>
